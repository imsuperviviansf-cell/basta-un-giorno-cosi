<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To the most special you ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #e8cfd4, #d8b2ba);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.88);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            backdrop-filter: blur(5px);
            z-index: 10;
            max-width: 90%;
            width: 440px;
            min-height: 320px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.5s ease;
        }
        .heart {
            font-size: 60px;
            color: #d16b7c;
            animation: heartbeat 1.5s infinite;
            margin-bottom: 25px;
            transition: all 0.5s ease;
        }
        @keyframes heartbeat {
            0% { transform: scale(1); }
            20% { transform: scale(1.1); }
            40% { transform: scale(1); }
            60% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        h1 {
            color: #4a4a4a;
            font-size: 22px;
            margin-bottom: 30px;
            line-height: 1.6;
            min-height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
        }
        .buttons {
            display: flex;
            justify-content: space-around;
            position: relative;
            height: 50px;
            width: 100%;
            transition: opacity 0.5s ease;
        }
        .btn {
            width: 110px;
            height: 45px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        #yes-btn {
            background-color: #d16b7c;
            color: white;
            box-shadow: 0 5px 15px rgba(209, 107, 124, 0.3);
        }
        #yes-btn:hover {
            transform: scale(1.05);
            background-color: #de7a8b;
        }
        #no-btn {
            background-color: #b0b7bd;
            color: white;
            position: absolute;
            right: 50px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="heart">❤️</div>
        <h1 id="text">Do you miss me?</h1>
        <div class="buttons" id="btn-group">
            <button class="btn" id="yes-btn">Yes</button>
            <button class="btn" id="no-btn">No</button>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yes-btn');
        const noBtn = document.getElementById('no-btn');
        const text = document.getElementById('text');
        const heart = document.querySelector('.heart');
        const btnGroup = document.getElementById('btn-group');

        const questions = [
            "Do you miss me?", 
            "Do you smile when you think of me?", 
            "Do you want to share every day with me?", 
            "Can I hold your hand from now on?" 
        ];
        
        let currentStep = 0;

        function moveNoButton() {
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;

            const randomX = Math.random() * (windowWidth - 140);
            const randomY = Math.random() * (windowHeight - 60);

            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        noBtn.addEventListener('mouseover', moveNoButton);
        noBtn.addEventListener('touchstart', moveNoButton);

        yesBtn.addEventListener('click', () => {
            currentStep++;

            if (currentStep < questions.length) {
                text.innerHTML = questions[currentStep];
                
                heart.style.transform = 'scale(1.2)';
                setTimeout(() => heart.style.transform = 'scale(1)', 200);
                
                noBtn.style.position = 'absolute';
                noBtn.style.right = '50px';
                noBtn.style.top = '0px';
            } else {
                text.innerHTML = "Of all the paths I've taken, my favorite ones lead to you. <br><br>The most lucky thing is to meet you.";
                
                btnGroup.style.opacity = '0';
                setTimeout(() => {
                    btnGroup.style.display = 'none';
                }, 500);
                
                heart.style.animation = 'heartbeat 0.8s infinite';
            }
        });
    </script>
</body>
</html>
