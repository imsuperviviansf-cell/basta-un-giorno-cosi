<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To the most special you ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #e8cfd4, #d8b2ba);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.88);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            backdrop-filter: blur(5px);
            z-index: 10;
            max-width: 90%;
            width: 440px;
            min-height: 340px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative; /* 锁定容器，让爱心只在白框内跑 */
            transition: all 0.5s ease;
        }
        .heart-box {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            position: relative;
        }
        .heart {
            font-size: 60px;
            color: #d16b7c;
            animation: heartbeat 1.5s infinite;
            transition: all 0.2s ease;
            user-select: none;
            -webkit-user-select: none;
        }
        .heart.game-mode {
            cursor: pointer;
            position: absolute; /* 在容器内绝对定位 */
            animation: heartbeat 0.6s infinite;
        }
        @keyframes heartbeat {
            0% { transform: scale(1); }
            20% { transform: scale(1.1); }
            40% { transform: scale(1); }
            60% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        h1 {
            color: #4a4a4a;
            font-size: 21px;
            margin-bottom: 35px;
            line-height: 1.6;
            min-height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            padding: 0 10px;
            transition: opacity 0.3s ease;
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 30px;
            position: relative;
            height: 50px;
            width: 100%;
            transition: opacity 0.3s ease;
        }
        .btn {
            width: 115px;
            height: 48px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        #yes-btn {
            background-color: #d16b7c;
            color: white;
            box-shadow: 0 5px 15px rgba(209, 107, 124, 0.3);
        }
        #yes-btn:hover {
            transform: scale(1.08);
            background-color: #de7a8b;
        }
        #no-btn {
            background-color: #a8dadc;
            color: #457b9d;
            position: absolute;
            left: 235px;
        }
        #si-btn {
            background-color: #a8dadc;
            color: #457b9d;
            display: none; /* 初始隐藏 */
            box-shadow: 0 5px 15px rgba(168, 218, 220, 0.4);
        }
        #si-btn:hover {
            transform: scale(1.08);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="heart-box" id="heart-area">
            <div class="heart" id="main-heart">❤️</div>
        </div>
        <h1 id="text">Do you miss me?</h1>
        
        <div class="buttons" id="btn-group">
            <button class="btn" id="yes-btn">Yes</button>
            <button class="btn" id="no-btn">No</button>
            <button class="btn" id="si-btn">Si ~</button>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yes-btn');
        const noBtn = document.getElementById('no-btn');
        const siBtn = document.getElementById('si-btn');
        const text = document.getElementById('text');
        const heart = document.getElementById('main-heart');
        const btnGroup = document.getElementById('btn-group');
        const heartArea = document.getElementById('heart-area');

        const questions = [
            "Do you miss me?", 
            "Do you smile when you think of me?", 
            "Do you want to share your days with me?"
        ];
        
        let currentStep = 0;
        let isGameMode = false;
        let score = 0;
        const targetScore = 3;

        // No按钮躲闪逻辑
        function moveNoButton() {
            if (isGameMode) return;
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            const randomX = Math.random() * (windowWidth - 140);
            const randomY = Math.random() * (windowHeight - 60);
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }
        noBtn.addEventListener('mouseover', moveNoButton);
        noBtn.addEventListener('touchstart', moveNoButton);

        // 爱心在白框内的安全躲闪逻辑
        function escapeHeart() {
            if (!isGameMode) return;
            // 限制爱心只能在包含块（heart-box）的宽高范围内移动
            const pWidth = heartArea.offsetWidth;
            const pHeight = heartArea.offsetHeight;

            // 留出爱心自身大小的余量，保证不出白框
            const randomX = Math.random() * (pWidth - 80);
            const randomY = Math.random() * (pHeight - 80);

            heart.style.left = randomX + 'px';
            heart.style.top = randomY + 'px';
        }

        // 点击 Yes 推进对话
        yesBtn.addEventListener('click', () => {
            currentStep++;

            if (currentStep < questions.length) {
                text.innerHTML = questions[currentStep];
                heart.style.transform = 'scale(1.2)';
                setTimeout(() => heart.style.transform = 'scale(1)', 200);
                
                noBtn.style.position = 'absolute';
                noBtn.style.left = '235px';
                noBtn.style.top = '0px';
            } else {
                // 点完第三个Yes，单独展示地道的意大利语第四句
                text.innerHTML = "Posso continuare a rubarti gli sguardi?";
                
                // 切换按钮：隐藏原有的Yes/No，显示温柔的意语“Si”按钮
                yesBtn.style.display = 'none';
                noBtn.style.display = 'none';
                siBtn.style.display = 'inline-block';
            }
        });

        // 按下意大利语的 "Si"，正式突袭启动抓爱心游戏！
        siBtn.addEventListener('click', () => {
            isGameMode = true;
            
            // 1. 瞬间清空文本和按钮，不给它们并存的机会
            text.innerHTML = "Catch my heart if you can! 😜";
            siBtn.style.display = 'none';
            btnGroup.style.display = 'none';

            // 2. 赋予爱心游戏属性，并直接在框内闪现
            heart.classList.add('game-mode');
            escapeHeart();

            // 3. 绑定逃跑事件
            heart.addEventListener('mouseover', escapeHeart);
            heart.addEventListener('touchstart', (e) => {
                e.preventDefault();
                escapeHeart();
            });
        });

        // 核心游戏逻辑：戳中爱心
        heart.addEventListener('click', () => {
            if (!isGameMode) return;
            
            score++;
            
            if (score < targetScore) {
                heart.style.color = '#c1121f';
                text.innerHTML = `Caught me ${score} time${score > 1 ? 's' : ''}! ${targetScore - score} more! 😜`;
                escapeHeart();
            } else {
                // 顺利通关，进入最高级的浪漫留白大结局
                isGameMode = false;
                
                // 清除游戏相关的定位和事件
                heart.style.position = 'static';
                heart.style.transform = 'scale(1.2)';
                heart.style.color = '#d16b7c';
                heart.style.animation = 'heartbeat 1s infinite';
                
                // 浮现终极宿命感英文
                text.style.opacity = '0';
                setTimeout(() => {
                    text.style.fontSize = '20px';
                    text.innerHTML = "Of all the paths I've taken, my favorite ones lead to you. <br><br>The most lucky thing is to meet you.";
                    text.style.opacity = '1';
                }, 400);
            }
        });
    </script>
</body>
</html>
